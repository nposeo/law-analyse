version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: law-analyse-db
    environment:
      POSTGRES_USER: lawanalyse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: law_analyse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawanalyse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: law-analyse-backend
    environment:
      DATABASE_URL: postgresql://lawanalyse:${DB_PASSWORD:-changeme}@db:5432/law_analyse
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  # Frontend (for local development with Docker)
  # In production, deploy to Vercel instead
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: law-analyse-frontend
    environment:
      PUBLIC_API_URL: http://localhost:8000
    ports:
      - "4321:4321"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
